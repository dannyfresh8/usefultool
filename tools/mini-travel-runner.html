<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Dodge obstacles while traveling the world! Jump and duck game.">
<link rel="canonical" href="https://usefultoolkit.org/tools/mini-travel-runner.html">
<title>Travel Runner - Obstacle Dodge</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg,#0f172a);color:var(--tx,#f1f5f9);min-height:100vh}
:root{--bg:#0f172a;--bg2:#1e293b;--tx:#f1f5f9;--t2:#94a3b8;--cd:#1e293b;--bd:#334155;--ac:#8b5cf6}
body.light-mode{--bg:#f8fafc;--bg2:#f1f5f9;--tx:#1e293b;--t2:#64748b;--cd:#fff;--bd:#e5e7eb}
.dm{position:fixed;top:12px;right:12px;z-index:9998;background:var(--cd);border:1px solid var(--bd);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px}
.hd{background:linear-gradient(135deg,#8b5cf6,#6366f1,#4f46e5);padding:20px 16px;text-align:center}
.hd h1{color:#fff;font-size:22px;margin-bottom:2px}.hd p{color:rgba(255,255,255,.8);font-size:13px}
.c{max-width:700px;margin:0 auto;padding:12px}.fo{text-align:center;padding:20px;font-size:12px;color:var(--t2)}
.ga{background:var(--cd);border:1px solid var(--bd);border-radius:16px;padding:16px;margin:12px 0;text-align:center}
.btn{display:inline-block;padding:10px 24px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none}
.bp{background:linear-gradient(135deg,#8b5cf6,#6366f1);color:#fff}.bp:hover{transform:scale(1.02);box-shadow:0 4px 16px rgba(139,92,246,.4)}
.bs{padding:6px 14px;font-size:12px}.st{font-size:13px;color:var(--t2)}.st span{color:var(--ac);font-weight:700}
.bk{display:inline-block;margin-bottom:10px;color:var(--ac);font-size:13px;text-decoration:none}.bk:hover{text-decoration:underline}
</style></head><body>
<div class="dm" onclick="var b=document.body;b.classList.toggle('light-mode');localStorage.setItem('light',b.classList.contains('light-mode')?'1':'')">&#127769;</div>
<div class="hd"><h1>Travel Runner</h1><p>Dodge obstacles while exploring the world!</p></div>
<div class="c"><a href="/tools/mini-games.html" class="bk">&larr; Back to Mini Games</a>
<div class="ga">
<canvas id="tr-c" width="400" height="300" style="max-width:100%;border:2px solid var(--bd);border-radius:10px;background:var(--bg2);display:block;margin:0 auto"></canvas>
<div class="st" style="margin-top:10px">Distance: <span id="tr-d">0</span>m &bull; Best: <span id="tr-b">0</span>m</div>
<button class="btn bp bs" style="margin-top:8px" onclick="trStart()">Start / Restart</button>
<p style="font-size:11px;color:var(--t2);margin-top:4px">SPACE/UP to jump &bull; DOWN to duck &bull; Tap on mobile</p>
</div></div>
<div class="fo">&copy; 2025 UseToolKit &bull; Free browser games</div>
<script>if(localStorage.getItem('light')==='1')document.body.classList.add('light-mode')</script>
<div id="gt" style="position:fixed;bottom:16px;right:16px;z-index:9999"></div>
<script>function googleTranslateElementInit(){new google.translate.TranslateElement({pageLanguage:"en",includedLanguages:"en,es,fr,de,it,pt,ru,ar,ja,ko,zh-CN,tr,nl,pl,sv,da,fi,no,cs,ro,hu,el,hi,th,vi",layout:google.translate.TranslateElement.InlineLayout.SIMPLE,autoDisplay:false},"gt")}</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
<script>
var tr={c:null,ctx:null,W:400,H:300,px:60,py:180,pw:30,ph:40,vy:0,g:0.6,j:-10,y0:220,obs:[],sc:0,bst:parseInt(localStorage.getItem("trB")||"0"),run:false,fr:0,sp:4,st:0};
function trInit(){tr.c=document.getElementById("tr-c");tr.ctx=tr.c.getContext("2d");tr.bst=parseInt(localStorage.getItem("trB")||"0");document.getElementById("tr-b").textContent=tr.bst}
function trR(){tr.py=180;tr.vy=0;tr.obs=[];tr.sc=0;tr.fr=0;tr.sp=4;tr.st=0;tr.run=false;document.getElementById("tr-d").textContent=0}
function trStart(){trR();tr.run=true;requestAnimationFrame(trL)}
function trL(){if(!tr.run)return;tr.fr++;tr.st++;if(tr.st>Math.max(40,80-tr.sp*4)){tr.st=0;tr.obs.push({x:tr.W,w:18+Math.random()*20,h:20+Math.random()*30,y:tr.y0-(20+Math.random()*30),t:Math.random()>0.6?"b":"o"});if(tr.obs.length>10)tr.obs.shift()}
tr.vy+=tr.g;tr.py+=tr.vy;if(tr.py>tr.y0-tr.ph){tr.py=tr.y0-tr.ph;tr.vy=0}
for(var i=tr.obs.length-1;i>=0;i--){var o=tr.obs[i];o.x-=tr.sp;if(o.x+o.w<0){tr.obs.splice(i,1);continue}
if(tr.px<tr.px+tr.pw&&tr.px+tr.pw>o.x&&tr.py<tr.py+tr.ph&&tr.py+tr.ph>o.y){
if(tr.sc>tr.bst){tr.bst=tr.sc;localStorage.setItem("trB",tr.bst);document.getElementById("tr-b").textContent=tr.bst}
document.getElementById("tr-d").textContent=Math.floor(tr.sc/10);tr.run=false;return}}
tr.dr();tr.sc+=Math.floor(tr.fr/5);document.getElementById("tr-d").textContent=Math.floor(tr.sc/10);if(tr.fr%60===0&&tr.sp<10)tr.sp+=0.5;requestAnimationFrame(trL)}
function trDrClear(){tr.ctx.fillStyle="#1e293b";tr.ctx.fillRect(0,0,tr.W,tr.H)}
function trDrGnd(){tr.ctx.fillStyle="#334155";tr.ctx.fillRect(0,tr.y0,tr.W,tr.H-tr.y0);tr.ctx.strokeStyle="#8b5cf6";tr.ctx.beginPath();tr.ctx.moveTo(0,tr.y0);tr.ctx.lineTo(tr.W,tr.y0);tr.ctx.stroke()}
function trDrP(){tr.ctx.fillStyle="#8b5cf6";var y=tr.vy<0?tr.py-5:tr.py;tr.ctx.fillRect(tr.px,y,tr.pw,tr.ph);tr.ctx.fillStyle="#fff";tr.ctx.beginPath();tr.ctx.arc(tr.px+20,y+8,5,0,Math.PI*2);tr.ctx.fill();tr.ctx.fillStyle="#ef4444";tr.ctx.beginPath();tr.ctx.arc(tr.px+15,y+6,2,0,Math.PI*2);tr.ctx.fill();tr.ctx.arc(tr.px+25,y+6,2,0,Math.PI*2);tr.ctx.fill()}
function trDrO(){for(var i=0;i<tr.obs.length;i++){var o=tr.obs[i];if(o.t==="b"){tr.ctx.fillStyle="#f59e0b";tr.ctx.fillRect(o.x,o.y-10,o.w,o.h)}else{tr.ctx.fillStyle="#ef4444";tr.ctx.fillRect(o.x,o.y,o.w,o.h)}}}
function trDr(){trDrClear();trDrGnd();trDrP();trDrO();tr.ctx.fillStyle="#94a3b8";tr.ctx.font="12px sans-serif";tr.ctx.fillText("Traveling: "+Math.floor(tr.sc/10)+"m",10,15)}
document.addEventListener("DOMContentLoaded",function(){trInit();
document.addEventListener("keydown",function(e){if((e.key===" "||e.key==="ArrowUp")&&tr.run&&tr.py>=tr.y0-tr.ph-2){e.preventDefault();tr.vy=tr.j}if(e.key==="ArrowDown"&&tr.run)tr.ph=20});
document.addEventListener("keyup",function(e){if(e.key==="ArrowDown")tr.ph=40});
tr.c.addEventListener("click",function(){if(!tr.run){trStart();return}if(tr.py>=tr.y0-tr.ph-2)tr.vy=tr.j});});
</script></body></html>
