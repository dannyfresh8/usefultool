<script>
var cq=[{q:"Which country has the largest population?",a:"India",o:["India","China","USA","Indonesia"]},{q:"What is the capital of Australia?",a:"Canberra",o:["Sydney","Melbourne","Canberra","Perth"]},{q:"Which country is both in Europe and Asia?",a:"Turkey",o:["Turkey","Russia","Egypt","Greece"]},{q:"Smallest country by area?",a:"Vatican City",o:["Monaco","Vatican City","San Marino","Liechtenstein"]},{q:"How many continents are there?",a:"7",o:["5","6","7","8"]},{q:"Country with most time zones?",a:"France",o:["USA","Russia","France","China"]},{q:"Longest river in the world?",a:"Nile",o:["Amazon","Nile","Yangtze","Mississippi"]},{q:"Country with most islands?",a:"Sweden",o:["Indonesia","Sweden","Philippines","Finland"]},{q:"Capital of Egypt?",a:"Cairo",o:["Cairo","Alexandria","Luxor","Giza"]},{q:"Which country invented pizza?",a:"Italy",o:["Greece","Italy","France","Spain"]},{q:"World's busiest airport?",a:"Atlanta",o:["Dubai","London","Beijing","Atlanta"]},{q:"Country with longest coastline?",a:"Canada",o:["Australia","Canada","Russia","Indonesia"]},{q:"Capital of Japan?",a:"Tokyo",o:["Seoul","Tokyo","Beijing","Bangkok"]},{q:"Home of the Amazon rainforest?",a:"Brazil",o:["Peru","Colombia","Brazil","Venezuela"]},{q:"Currency of Japan?",a:"Yen",o:["Yuan","Won","Yen","Ringgit"]},{q:"Highest mountain (Everest) is where?",a:"Nepal",o:["Nepal","India","China","Bhutan"]},{q:"Capital of Canada?",a:"Ottawa",o:["Toronto","Vancouver","Ottawa","Montreal"]},{q:"Most UNESCO sites?",a:"Italy",o:["China","Spain","Italy","France"]},{q:"Driest continent?",a:"Antarctica",o:["Africa","Australia","Antarctica","Asia"]},{q:"Country with most pyramids?",a:"Sudan",o:["Egypt","Mexico","Sudan","Peru"]}];
var cqi=0,cqs=0;
function cqS(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function cqShow(i){
  var d=cq[i];if(!d){document.getElementById("cq-area").innerHTML="<h2>Done!</h2><p>Score: "+cqs+"/"+cq.length+"</p><button class='btn bp' onclick='cqi=0;cqs=0;cqShow(0)'>Play Again</button>";return}
  var h="<h2 style='font-size:15px;margin-bottom:12px'>Question "+(i+1)+"/"+cq.length+"</h2><p style='font-size:18px;margin-bottom:16px'>"+d.q+"</p>";
  var opts=cqS(d.o.slice());

  }
  document.getElementById("cq-area").innerHTML=h;
}
cqShow(0);
</script></body></html>
