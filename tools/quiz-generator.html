xed</option><option value="mc">MC</option><option value="tf">T/F</option></select></div></div><div id="qA"></div></div><div class="tool-actions"><button class="btn btn-primary" onclick="qG()">🎯 Generate</button><button class="btn btn-secondary" onclick="qC()">✅ Check</button><button class="btn btn-secondary" onclick="rT('qA')">Reset</button></div><div id="qR"></div><div class="related-links"><h3>Student Tools</h3><a href="/tools/student-tools.html">Hub</a><a href="/tools/flashcard-maker.html">Flashcards</a><a href="/tools/study-planner.html">Planner</a></div><script>function rT(i){var e=document.getElementById(i);if(e)e.style.display="none"}var qA=[],qC=0;var letters=["A","B","C","D"];function qG(){var t=document.getElementById("qT").value.trim()||"General";var n=parseInt(document.getElementById("qN").value);var ty=document.getElementById("qTy").value;var a=document.getElementById("qA");qA=[];var h="<form id="qF">";for(var i=0;i<n;i++){var mc=ty==="mixed"?Math.random()>0.5:ty==="mc";if(mc){var ansIdx=Math.floor(Math.random()*4);qA.push(letters[ansIdx]);h+="<div class="st-c"><b>"+(i+1)+". About "+t+"?</b>";for(var j=0;j<4;j++){h+="<label style="display:block;padding:6px 10px;cursor:pointer"><input type="radio" name="q"+i+"" value=""+letters[j]+""> "+letters[j]+". Option</label>"}h+="</div>"}else{var tf=Math.random()>0.5;qA.push(tf?"T":"F");h+="<div class="st-c"><b>"+(i+1)+". T/F: Statement about "+t+"</b><label style="display:block;padding:6px 10px;cursor:pointer"><input type="radio" name="q"+i+"" value="T"> True</label><label style="display:block;padding:6px 10px;cursor:pointer"><input type="radio" name="q"+i+"" value="F"> False</label></div>"}}h+="</form>";a.innerHTML=h;a.style.display="block";document.getElementById("qR").innerHTML=""}function qC(){var f=document.getElementById("qF");if(!f){alert("Generate first");return}qC=0;for(var i=0;i<qA.length;i++){var s=f.querySelector("input[name="q"+i+""]:checked");if(s&&s.value===qA[i])qC++}var p=Math.round(qC/qA.length*100);var g=p>=90?"A":p>=80?"B":p>=70?"C":p>=60?"D":"F";var r=document.getElementById("qR");r.innerHTML="<div class="st-r" style="text-align:center"><b>✅ "+qC+"/"+qA.length+" ("+p+"%)</b><br>Grade: "+g+"</div>";r.style.display="block"}</script></div><footer><p>&copy; 2025 UseToolKit. Free online tools &amp; resources.</p></footer><script>if(localStorage.getItem('dark')==='1')document.body.classList.add('dark-mode');</script><div id="google_translate_element" style="position:fixed;bottom:16px;right:16px;z-index:9999"></div><script>function googleTranslateElementInit(){new google.translate.TranslateElement({pageLanguage:"en",includedLanguages:"en,es,fr,de,it,pt,ru,ar,ja,ko,zh-CN,tr,nl,pl,sv,da,fi,no,cs,ro,hu,el,hi,th,vi",layout:google.translate.TranslateElement.InlineLayout.SIMPLE,autoDisplay:false},"google_translate_element")}</script><script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script></body></html>
